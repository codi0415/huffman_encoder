<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>종합 인코딩 & 변환 도구 (Pro)</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(74, 222, 128, 0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(74, 222, 128, 0.5); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- 아이콘 모음 ---
        const RefreshIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const TypeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>;
        const BinaryIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="8" y1="12" x2="8" y2="16"/><line x1="8" y1="8" x2="8.01" y2="8"/><line x1="16" y1="8" x2="16" y2="16"/><line x1="12" y1="8" x2="12" y2="16"/></svg>;
        const ChartIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="4" height="7"/><rect x="15" y="4" width="4" height="13"/></svg>;
        const DecodeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>;
        const CalculatorIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;

        // --- 1. 허프만 트리를 위한 클래스 ---
        class HuffmanNode {
            constructor(char, freq, left = null, right = null) {
                this.char = char;
                this.freq = freq;
                this.left = left;
                this.right = right;
            }
        }

        // --- 2. 허프만 인코딩 & 디코딩 컴포넌트 ---
        function HuffmanEncoder() {
            const [inputText, setInputText] = useState('허프만 코딩은 데이터 압축을 위한 무손실 압축 알고리즘입니다.');
            const [decodeInput, setDecodeInput] = useState('');
            
            // 인코딩 계산 및 사전(트리) 생성
            const encodingResult = useMemo(() => {
                if (!inputText || inputText.length === 0) return null;

                const freqs = {};
                for (let i = 0; i < inputText.length; i++) {
                    const char = inputText[i];
                    freqs[char] = (freqs[char] || 0) + 1;
                }

                let nodes = Object.keys(freqs).map((char) => new HuffmanNode(char, freqs[char]));

                if (nodes.length === 1) {
                    const char = nodes[0].char;
                    return {
                        encodedText: '0'.repeat(inputText.length),
                        dict: { [char]: '0' },
                        freqs,
                        root: nodes[0],
                        stats: { originalBits: inputText.length * 8, encodedBits: inputText.length, ratio: ((1 - (1 / 8)) * 100).toFixed(2) }
                    };
                }

                while (nodes.length > 1) {
                    nodes.sort((a, b) => a.freq - b.freq);
                    const left = nodes.shift();
                    const right = nodes.shift();
                    nodes.push(new HuffmanNode(null, left.freq + right.freq, left, right));
                }

                const root = nodes[0];
                const dict = {};

                function generateCodes(node, currentCode) {
                    if (!node) return;
                    if (node.char !== null) {
                        dict[node.char] = currentCode;
                        return;
                    }
                    generateCodes(node.left, currentCode + '0');
                    generateCodes(node.right, currentCode + '1');
                }
                generateCodes(root, '');

                let encodedText = '';
                for (let i = 0; i < inputText.length; i++) {
                    encodedText += dict[inputText[i]];
                }

                return {
                    encodedText, dict, freqs, root,
                    stats: {
                        originalBits: inputText.length * 16, 
                        encodedBits: encodedText.length,
                        ratio: ((1 - (encodedText.length / (inputText.length * 16))) * 100).toFixed(2)
                    }
                };
            }, [inputText]);

            // 디코딩(양방향 복원) 로직
            const decodedResult = useMemo(() => {
                if (!encodingResult || !encodingResult.root || !decodeInput) return '';
                const rootNode = encodingResult.root;
                
                // 단일 문자 예외 처리
                if (!rootNode.left && !rootNode.right) {
                     return rootNode.char.repeat(decodeInput.replace(/[^01]/g, '').length);
                }

                let decoded = '';
                let curr = rootNode;
                for (let bit of decodeInput) {
                    if (bit === '0') curr = curr.left;
                    else if (bit === '1') curr = curr.right;
                    else continue; // 0과 1이 아닌 문자는 무시

                    if (curr && curr.char !== null) {
                        decoded += curr.char;
                        curr = rootNode; // 다시 루트로 이동
                    }
                }
                return decoded;
            }, [decodeInput, encodingResult]);

            const displayChar = (char) => {
                if (char === ' ') return <span className="text-gray-400 italic">[공백]</span>;
                if (char === '\n') return <span className="text-gray-400 italic">[줄바꿈]</span>;
                if (char === '\t') return <span className="text-gray-400 italic">[탭]</span>;
                return char;
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-fade-in">
                    {/* 왼쪽 패널: 텍스트 입력 및 인코딩/디코딩 결과 */}
                    <div className="space-y-6">
                        
                        {/* 텍스트 입력부 (트리 훈련 영역) */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-100/50 px-4 py-3 border-b border-slate-200 flex items-center space-x-2">
                                <span className="text-indigo-500"><TypeIcon /></span>
                                <h2 className="font-semibold">원본 텍스트 (사전 생성용)</h2>
                            </div>
                            <div className="p-4">
                                <textarea
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder="인코딩할 텍스트를 여기에 입력하세요..."
                                    className="w-full h-32 p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none transition-all"
                                />
                                {encodingResult && (
                                    <div className="mt-4">
                                        <div className="text-xs text-slate-500 mb-1 font-semibold flex justify-between">
                                            <span>인코딩된 이진수 결과</span>
                                            <button 
                                                onClick={() => setDecodeInput(encodingResult.encodedText)}
                                                className="text-indigo-600 hover:text-indigo-800 transition-colors"
                                            >
                                                복사해서 디코딩해보기 ↓
                                            </button>
                                        </div>
                                        <div className="w-full h-24 p-3 bg-slate-900 text-emerald-400 font-mono text-sm rounded-lg overflow-y-auto break-all custom-scrollbar border border-slate-800">
                                            {encodingResult.encodedText}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 디코딩 테스트 영역 (신규) */}
                        <div className="bg-white rounded-xl shadow-sm border border-emerald-200 overflow-hidden">
                            <div className="bg-emerald-50 px-4 py-3 border-b border-emerald-200 flex items-center space-x-2">
                                <span className="text-emerald-600"><DecodeIcon /></span>
                                <h2 className="font-semibold text-emerald-900">이진수 디코딩 (양방향 변환)</h2>
                            </div>
                            <div className="p-4">
                                <textarea
                                    value={decodeInput}
                                    onChange={(e) => setDecodeInput(e.target.value)}
                                    placeholder="이진수(0과 1)를 입력하면 위에서 생성된 허프만 사전을 이용해 텍스트로 복원합니다."
                                    className="w-full h-24 p-3 bg-slate-50 border border-emerald-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none transition-all font-mono text-sm mb-3"
                                />
                                <div className="text-xs text-emerald-600 mb-1 font-semibold">복원된 텍스트 결과</div>
                                <div className="w-full h-24 p-3 bg-white text-slate-800 border border-emerald-100 rounded-lg overflow-y-auto custom-scrollbar">
                                    {decodedResult || <span className="text-slate-400">결과가 여기에 표시됩니다.</span>}
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* 오른쪽 패널: 사전과 통계 */}
                    <div className="space-y-6">
                        {encodingResult && (
                            <div className="grid grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                                    <div className="text-xs text-slate-500 mb-1">예상 원본 크기</div>
                                    <div className="text-lg font-bold text-slate-700">{encodingResult.stats.originalBits.toLocaleString()} bits</div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                                    <div className="text-xs text-slate-500 mb-1">압축된 크기</div>
                                    <div className="text-lg font-bold text-indigo-600">{encodingResult.stats.encodedBits.toLocaleString()} bits</div>
                                </div>
                                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-center shadow-sm">
                                    <div className="text-xs text-indigo-600/70 mb-1">압축률</div>
                                    <div className="text-lg font-bold text-indigo-700">{encodingResult.stats.ratio}%</div>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full lg:max-h-[calc(100vh-17rem)] overflow-hidden">
                            <div className="bg-slate-100/50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                                <div className="flex items-center space-x-2">
                                    <span className="text-indigo-500"><ChartIcon /></span>
                                    <h2 className="font-semibold">허프만 코드 테이블 (기준 사전)</h2>
                                </div>
                            </div>
                            <div className="overflow-y-auto flex-1 custom-scrollbar">
                                {encodingResult ? (
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-50 sticky top-0 shadow-sm z-10">
                                            <tr>
                                                <th className="px-4 py-3 text-xs font-semibold text-slate-500 border-b">문자</th>
                                                <th className="px-4 py-3 text-xs font-semibold text-slate-500 border-b">빈도</th>
                                                <th className="px-4 py-3 text-xs font-semibold text-slate-500 border-b">코드</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {Object.entries(encodingResult.dict)
                                                .sort((a, b) => a[1].length - b[1].length || encodingResult.freqs[b[0]] - encodingResult.freqs[a[0]])
                                                .map(([char, code]) => (
                                                    <tr key={char} className="hover:bg-slate-50/50">
                                                        <td className="px-4 py-3 border-b border-slate-50">
                                                            <div className="font-medium bg-slate-100 inline-block px-2 py-1 rounded text-center min-w-[2rem]">
                                                                {displayChar(char)}
                                                            </div>
                                                        </td>
                                                        <td className="px-4 py-3 text-slate-600 border-b border-slate-50">{encodingResult.freqs[char]}</td>
                                                        <td className="px-4 py-3 font-mono text-indigo-600 text-sm border-b border-slate-50">{code}</td>
                                                    </tr>
                                                ))}
                                        </tbody>
                                    </table>
                                ) : (
                                    <div className="flex items-center justify-center h-full text-slate-400 p-8">원본 텍스트를 입력하세요.</div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 3. 진수 변환기 컴포넌트 ---
        function BaseConverter() {
            // 포커스 해제 문제를 해결하기 위해 통합 상태 사용
            const [baseState, setBaseState] = useState({ base: 'dec', value: '' });

            // 입력값 처리 (소수 지원, 정규식 적용)
            const handleBaseChange = (targetBase, rawValue) => {
                const filters = { bin: /[^01.]/g, oct: /[^0-7.]/g, dec: /[^0-9.]/g, hex: /[^0-9A-Fa-f.]/g };
                let val = rawValue.replace(filters[targetBase], '');
                
                // 소수점 여러개 방지
                const dotParts = val.split('.');
                if (dotParts.length > 2) {
                    val = dotParts[0] + '.' + dotParts.slice(1).join('');
                }
                setBaseState({ base: targetBase, value: val });
            };

            // N진수 문자열 -> 10진수 숫자 (소수점 연산 포함)
            const getDecValue = (baseStr, valStr) => {
                if (!valStr || valStr === '.') return NaN;
                const b = baseStr === 'hex' ? 16 : baseStr === 'oct' ? 8 : baseStr === 'bin' ? 2 : 10;
                const [intPart, fracPart] = valStr.split('.');
                
                let num = parseInt(intPart || '0', b);
                
                if (fracPart !== undefined) {
                    let frac = 0;
                    for (let i = 0; i < fracPart.length; i++) {
                        const digit = parseInt(fracPart[i], b);
                        if (!isNaN(digit)) {
                            frac += digit / Math.pow(b, i + 1);
                        }
                    }
                    num += frac;
                }
                return num;
            };

            // 10진수 숫자 -> N진수 문자열
            const formatBase = (decNum, targetBase) => {
                if (isNaN(decNum)) return '';
                const b = targetBase === 'hex' ? 16 : targetBase === 'oct' ? 8 : targetBase === 'bin' ? 2 : 10;
                return decNum.toString(b).toUpperCase();
            };

            const currentDecVal = getDecValue(baseState.base, baseState.value);

            // 현재 타이핑 중인 입력칸은 그대로 보여주고, 나머지는 계산해서 반환
            const getDisplayValue = (targetBase) => {
                if (baseState.base === targetBase) return baseState.value;
                return formatBase(currentDecVal, targetBase);
            };

            const configs = [
                { id: 'bin', label: '2진수 (Binary - Base 2)', placeholder: '예: 1010.11', color: 'text-emerald-600' },
                { id: 'oct', label: '8진수 (Octal - Base 8)', placeholder: '예: 12.3', color: 'text-amber-600' },
                { id: 'dec', label: '10진수 (Decimal - Base 10)', placeholder: '예: 10.5', color: 'text-slate-800' },
                { id: 'hex', label: '16진수 (Hexadecimal - Base 16)', placeholder: '예: A.8', color: 'text-purple-600' }
            ];

            return (
                <div className="max-w-3xl mx-auto space-y-6 animate-fade-in">
                    <div className="bg-indigo-50 p-6 rounded-xl border border-indigo-100 text-center mb-8">
                        <p className="text-indigo-800">어떤 칸에든 숫자를 입력하면 <strong>나머지가 실시간 자동 변환</strong>됩니다.</p>
                        <p className="text-sm text-indigo-600/80 mt-1">소수점(.) 입력도 완벽하게 지원하며, 각 진수에 안 맞는 글자는 무시됩니다.</p>
                    </div>

                    <div className="grid gap-6">
                        {configs.map((conf) => (
                            <div key={conf.id} className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-transparent transition-all">
                                <label className="block text-sm font-bold text-slate-700 mb-2">{conf.label}</label>
                                <input
                                    type="text"
                                    value={getDisplayValue(conf.id)}
                                    onChange={(e) => handleBaseChange(conf.id, e.target.value)}
                                    placeholder={conf.placeholder}
                                    className={`w-full text-xl md:text-2xl font-mono bg-transparent border-b-2 border-slate-200 py-2 focus:outline-none ${conf.color}`}
                                    spellCheck="false"
                                />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- 4. 메인 앱 (탭 관리) ---
        function App() {
            const [activeTab, setActiveTab] = useState('huffman');

            return (
                <div className="min-h-screen text-slate-800 p-4 md:p-8 font-sans">
                    <div className="max-w-6xl mx-auto">
                        
                        <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center space-x-3">
                                <div className="p-3 bg-indigo-600 rounded-lg text-white shadow-lg">
                                    {activeTab === 'huffman' ? <RefreshIcon /> : <CalculatorIcon />}
                                </div>
                                <div>
                                    <h1 className="text-3xl font-bold text-slate-900">개발자 도구 상자</h1>
                                    <p className="text-slate-500 mt-1">
                                        {activeTab === 'huffman' ? '텍스트 기반 사전 생성 및 이진수 양방향 복원' : '정수와 소수를 모두 지원하는 진수 실시간 변환'}
                                    </p>
                                </div>
                            </div>

                            <div className="flex bg-slate-200/60 p-1 rounded-xl w-full md:w-auto">
                                <button 
                                    onClick={() => setActiveTab('huffman')}
                                    className={`flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-semibold transition-all ${activeTab === 'huffman' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    양방향 허프만 변환
                                </button>
                                <button 
                                    onClick={() => setActiveTab('converter')}
                                    className={`flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-semibold transition-all ${activeTab === 'converter' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    소수점 진수 변환기
                                </button>
                            </div>
                        </header>

                        <main>
                            {activeTab === 'huffman' ? <HuffmanEncoder /> : <BaseConverter />}
                        </main>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
