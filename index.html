<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>허프만 인코딩기</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        import React, { useState, useMemo } from 'react';
import { ArrowRight, RefreshCw, Type, Binary, BarChart3, HelpCircle } from 'lucide-react';

// 허프만 트리 노드 클래스
class HuffmanNode {
  constructor(char, freq, left = null, right = null) {
    this.char = char;
    this.freq = freq;
    this.left = left;
    this.right = right;
  }
}

export default function App() {
  const [inputText, setInputText] = useState('허프만 코딩은 데이터 압축을 위한 무손실 압축 알고리즘입니다. 자주 나타나는 문자에는 짧은 코드를 할당하고, 드물게 나타나는 문자에는 긴 코드를 할당합니다.');
  
  // 허프만 인코딩 로직을 실행하는 메모이제이션 훅
  const encodingResult = useMemo(() => {
    if (!inputText || inputText.length === 0) return null;

    // 1. 빈도수 계산
    const freqs = {};
    for (let i = 0; i < inputText.length; i++) {
      const char = inputText[i];
      freqs[char] = (freqs[char] || 0) + 1;
    }

    // 2. 노드 생성 및 우선순위 큐(배열 정렬로 대체) 초기화
    let nodes = Object.keys(freqs).map((char) => new HuffmanNode(char, freqs[char]));

    // 단일 문자만 입력된 경우 예외 처리
    if (nodes.length === 1) {
      const char = nodes[0].char;
      return {
        encodedText: '0'.repeat(inputText.length),
        dict: { [char]: '0' },
        freqs,
        stats: {
          originalBits: inputText.length * 8, // 기본적으로 1글자를 8비트로 가정 (비교 목적)
          encodedBits: inputText.length,
        }
      };
    }

    // 3. 허프만 트리 구축
    while (nodes.length > 1) {
      nodes.sort((a, b) => a.freq - b.freq); // 빈도 오름차순 정렬
      
      const left = nodes.shift();
      const right = nodes.shift();
      
      const newNode = new HuffmanNode(null, left.freq + right.freq, left, right);
      nodes.push(newNode);
    }

    const root = nodes[0];

    // 4. 허프만 코드 테이블 생성
    const dict = {};
    function generateCodes(node, currentCode) {
      if (!node) return;
      if (node.char !== null) {
        dict[node.char] = currentCode;
        return;
      }
      generateCodes(node.left, currentCode + '0');
      generateCodes(node.right, currentCode + '1');
    }
    
    generateCodes(root, '');

    // 5. 텍스트 인코딩
    let encodedText = '';
    for (let i = 0; i < inputText.length; i++) {
      encodedText += dict[inputText[i]];
    }

    // 6. 통계 계산 (1 문자를 8비트(1바이트)로 가정하여 비교)
    // 한글 등 유니코드는 실제 16~24비트이지만 직관적인 비교를 위해 8비트 ASCII 기준으로 표시
    const originalBits = inputText.length * 16; 
    const encodedBits = encodedText.length;

    return {
      encodedText,
      dict,
      freqs,
      stats: {
        originalBits,
        encodedBits,
        ratio: ((1 - (encodedBits / originalBits)) * 100).toFixed(2)
      }
    };
  }, [inputText]);

  // 특수 문자 표시 헬퍼
  const displayChar = (char) => {
    if (char === ' ') return <span className="text-gray-400 italic">[공백]</span>;
    if (char === '\n') return <span className="text-gray-400 italic">[줄바꿈]</span>;
    if (char === '\t') return <span className="text-gray-400 italic">[탭]</span>;
    return char;
  };

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 font-sans">
      <div className="max-w-6xl mx-auto space-y-6">
        
        {/* 헤더 */}
        <header className="flex items-center space-x-3 mb-8">
          <div className="p-3 bg-indigo-600 rounded-lg text-white shadow-lg">
            <RefreshCw className="w-8 h-8" />
          </div>
          <div>
            <h1 className="text-3xl font-bold text-slate-900">허프만 인코딩기</h1>
            <p className="text-slate-500 mt-1">입력된 텍스트의 문자 빈도를 분석하여 최적의 이진 코드로 압축합니다.</p>
          </div>
        </header>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
          {/* 왼쪽 패널: 입력 및 기본 결과 */}
          <div className="space-y-6">
            
            {/* 텍스트 입력 영역 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-100/50 px-4 py-3 border-b border-slate-200 flex items-center space-x-2">
                <Type className="w-5 h-5 text-indigo-500" />
                <h2 className="font-semibold">원본 텍스트 입력</h2>
              </div>
              <div className="p-4">
                <textarea
                  value={inputText}
                  onChange={(e) => setInputText(e.target.value)}
                  placeholder="인코딩할 텍스트를 여기에 입력하세요..."
                  className="w-full h-40 p-3 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none transition-all"
                />
                <div className="text-right text-xs text-slate-400 mt-2">
                  길이: {inputText.length} 글자
                </div>
              </div>
            </div>

            {/* 인코딩 결과 영역 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-100/50 px-4 py-3 border-b border-slate-200 flex items-center space-x-2">
                <Binary className="w-5 h-5 text-indigo-500" />
                <h2 className="font-semibold">인코딩된 이진 데이터</h2>
              </div>
              <div className="p-4">
                {encodingResult ? (
                  <div className="relative">
                    <div className="w-full h-40 p-3 bg-slate-900 text-emerald-400 font-mono text-sm rounded-lg overflow-y-auto break-all border border-slate-800 custom-scrollbar">
                      {encodingResult.encodedText}
                    </div>
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center h-40 text-slate-400">
                    <HelpCircle className="w-8 h-8 mb-2 opacity-50" />
                    <p>텍스트를 입력하면 결과가 나타납니다.</p>
                  </div>
                )}
              </div>
            </div>

            {/* 압축 통계 */}
            {encodingResult && (
              <div className="grid grid-cols-3 gap-4">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
                  <div className="text-xs text-slate-500 mb-1 font-medium">예상 원본 크기</div>
                  <div className="text-lg font-bold text-slate-700">{encodingResult.stats.originalBits.toLocaleString()} <span className="text-xs font-normal">bits</span></div>
                  <div className="text-[10px] text-slate-400 mt-1">(1글자 = 16bits 가정)</div>
                </div>
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
                  <div className="text-xs text-slate-500 mb-1 font-medium">압축된 크기</div>
                  <div className="text-lg font-bold text-indigo-600">{encodingResult.stats.encodedBits.toLocaleString()} <span className="text-xs font-normal">bits</span></div>
                </div>
                <div className="bg-indigo-50 p-4 rounded-xl shadow-sm border border-indigo-100 text-center">
                  <div className="text-xs text-indigo-600/70 mb-1 font-medium">공간 절약(압축률)</div>
                  <div className="text-lg font-bold text-indigo-700">{encodingResult.stats.ratio}%</div>
                </div>
              </div>
            )}
          </div>

          {/* 오른쪽 패널: 코드 테이블 */}
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden lg:max-h-[calc(100vh-8rem)]">
            <div className="bg-slate-100/50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
              <div className="flex items-center space-x-2">
                <BarChart3 className="w-5 h-5 text-indigo-500" />
                <h2 className="font-semibold">허프만 코드 테이블 (사전)</h2>
              </div>
              {encodingResult && (
                <span className="text-xs font-medium bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full">
                  고유 문자: {Object.keys(encodingResult.dict).length}개
                </span>
              )}
            </div>
            
            <div className="p-0 overflow-y-auto flex-1">
              {encodingResult ? (
                <table className="w-full text-left border-collapse">
                  <thead className="bg-slate-50 sticky top-0 shadow-sm z-10">
                    <tr>
                      <th className="px-4 py-3 text-xs font-semibold text-slate-500 border-b w-1/4">문자</th>
                      <th className="px-4 py-3 text-xs font-semibold text-slate-500 border-b w-1/4">출현 빈도</th>
                      <th className="px-4 py-3 text-xs font-semibold text-slate-500 border-b w-1/2">허프만 코드</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {Object.entries(encodingResult.dict)
                      // 코드가 짧은 순(빈도가 높은 순)으로 정렬
                      .sort((a, b) => a[1].length - b[1].length || encodingResult.freqs[b[0]] - encodingResult.freqs[a[0]])
                      .map(([char, code]) => (
                        <tr key={char} className="hover:bg-slate-50/50 transition-colors">
                          <td className="px-4 py-3 border-b border-slate-50">
                            <div className="font-medium bg-slate-100 inline-block px-2 py-1 rounded border border-slate-200 min-w-[2rem] text-center">
                              {displayChar(char)}
                            </div>
                          </td>
                          <td className="px-4 py-3 text-slate-600 border-b border-slate-50">
                            <div className="flex items-center">
                              <span className="w-8">{encodingResult.freqs[char]}</span>
                              <div className="flex-1 h-1.5 bg-slate-100 rounded-full ml-2 overflow-hidden">
                                <div 
                                  className="h-full bg-indigo-400 rounded-full" 
                                  style={{ 
                                    width: `${(encodingResult.freqs[char] / Math.max(...Object.values(encodingResult.freqs))) * 100}%` 
                                  }}
                                />
                              </div>
                            </div>
                          </td>
                          <td className="px-4 py-3 font-mono text-indigo-600 border-b border-slate-50 text-sm">
                            {code}
                          </td>
                        </tr>
                      ))}
                  </tbody>
                </table>
              ) : (
                <div className="flex items-center justify-center h-full text-slate-400 p-8 text-center">
                  텍스트를 입력하면 각 문자에 할당된 가변 길이의 이진 코드(허프만 코드)가 여기에 분석되어 표시됩니다.
                </div>
              )}
            </div>
          </div>

        </div>
      </div>
      
      <style dangerouslySetInnerHTML={{__html: `
        .custom-scrollbar::-webkit-scrollbar {
          width: 8px;
          height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: rgba(15, 23, 42, 0.5);
          border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(74, 222, 128, 0.3);
          border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: rgba(74, 222, 128, 0.5);
        }
      `}} />
    </div>
  );
}
        const { useState, useMemo } = React;

        function HuffmanApp() {
            const [text, setText] = useState("Hello Huffman!");
            // ... (중략: 위에서 드린 로직과 동일) ...
            return (
                <div className="p-10">
                    <h1 className="text-2xl font-bold mb-4">허프만 인코딩기</h1>
                    <textarea 
                        className="w-full border p-2 rounded"
                        value={text} 
                        onChange={(e) => setText(e.target.value)} 
                    />
                    <div className="mt-4 p-4 bg-gray-100 rounded break-all">
                        <strong>결과:</strong> {text ? "분석 중..." : "텍스트를 입력하세요"}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HuffmanApp />);
    </script>
</body>
</html>
